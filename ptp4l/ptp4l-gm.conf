#
# Automotive Profile example configuration for server containing those
# attributes which differ from the defaults.  See the file, default.cfg, for
# the complete list of available options.
#
# Added grandmaster-specific settings to the end of the file, which are applied via
# the pmc command in the ptp4l-gm.service file.  This is necessary to ensure that the
# grandmaster settings are applied even if the BMCA is disabled (as it is here).
#
[global]
#
# Options carried over from gPTP.
#
gmCapable               1
priority1               1
priority2               1
logSyncInterval         -3
syncReceiptTimeout      3
neighborPropDelayThresh 800
min_neighbor_prop_delay -20000000
assume_two_step         1
path_trace_enabled      1
follow_up_info          1
transportSpecific       0x1
ptp_dst_mac             01:80:C2:00:00:0E
network_transport       L2
delay_mechanism         P2P
#
# Automotive Profile specific options
#
BMCA                    noop
inhibit_announce        1
asCapable               true
inhibit_delay_req       1
#
# Grandmaster-specific settings
#
clockClass              6
clockAccuracy           0x21
offsetScaledLogVariance 0x4e5d
timeSource              0x20
serverOnly              1
clock_servo             pi
leapfile                /usr/share/zoneinfo/leap-seconds.list

